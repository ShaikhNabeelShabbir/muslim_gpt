name: muslim_gpt
description: "An Islamic Q&A chatbot powered by AI with Quran and Hadith citations."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^3.2.1
  go_router: ^14.0.0
  uuid: ^4.5.1
  shared_preferences: ^2.5.4
  intl: ^0.19.0
  flutter_markdown: ^0.7.0
  flutter_svg: ^2.0.0
  sqflite: ^2.4.2
  path: ^1.9.1
  fllama: ^0.0.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/corpus/chunks.json
    - assets/corpus/embeddings.bin
    - assets/corpus/idf_weights.json
    # - assets/models/qwen2.5-1.5b-instruct-q2_k.gguf
    - assets/models/qwen2.5-1.5b-instruct-q4_k_m-00001-of-00001.gguf
  fonts:
    - family: AmiriQuran
      fonts:
        - asset: assets/fonts/AmiriQuran-Regular.ttf
    - family: NotoNaskhArabic
      fonts:
        - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
